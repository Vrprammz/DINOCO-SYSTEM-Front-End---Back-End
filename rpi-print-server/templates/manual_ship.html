<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual Shipping - Flash Express</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans Thai',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.top-bar{background:#1e293b;border-bottom:1px solid #334155;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.top-bar h1{font-size:18px;font-weight:700;color:#f8fafc}
.top-bar .badge{background:#2563eb;color:#fff;font-size:11px;padding:3px 10px;border-radius:12px}
.tabs{display:flex;gap:0;background:#1e293b;border-bottom:1px solid #334155}
.tab{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:600;cursor:pointer;color:#94a3b8;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:#60a5fa;border-bottom-color:#2563eb}
.tab:hover{color:#cbd5e1}
.content{max-width:640px;margin:0 auto;padding:16px}

/* ── Form ── */
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:700;color:#f8fafc;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title .icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid.full{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:3px}
.field.span-2{grid-column:span 2}
.field label{font-size:11px;color:#94a3b8;font-weight:600}
.field input,.field textarea,.field select{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:9px 12px;color:#f8fafc;font-size:14px;font-family:inherit;transition:.2s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.2)}
.field textarea{resize:vertical;min-height:60px}
.field .hint{font-size:10px;color:#64748b}

/* ── Hardcoded sender ── */
.sender-info{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;font-size:12px;line-height:1.6;color:#94a3b8}
.sender-info b{color:#f8fafc}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.2s}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-primary:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-ghost{background:transparent;border:1px solid #334155;color:#94a3b8}.btn-ghost:hover{background:#1e293b;color:#f8fafc}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-group{display:flex;gap:8px;margin-top:14px}

/* ── Result ── */
.result-box{background:#064e3b;border:1px solid #10b981;border-radius:10px;padding:14px;margin-top:14px;display:none}
.result-box.error{background:#450a0a;border-color:#dc2626}
.result-box .pno{font-size:18px;font-weight:900;font-family:'Courier New',monospace;color:#34d399;letter-spacing:1px}
.result-box.error .pno{color:#f87171}

/* ── Loading ── */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #334155;border-top-color:#60a5fa;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Table ── */
.shipments-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.month-select{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:6px 10px;color:#f8fafc;font-size:13px}
.ship-table{width:100%;border-collapse:collapse;font-size:12px}
.ship-table th{background:#334155;color:#94a3b8;padding:8px 10px;text-align:left;font-weight:600;position:sticky;top:0}
.ship-table td{padding:8px 10px;border-bottom:1px solid #1e293b;color:#cbd5e1}
.ship-table tr:hover td{background:#1e293b}
.ship-table .pno-cell{font-family:'Courier New',monospace;font-weight:700;color:#60a5fa;font-size:11px}
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.status-created{background:#1e3a5f;color:#60a5fa}
.status-cancelled{background:#450a0a;color:#f87171}
.status-delivered{background:#064e3b;color:#34d399}
.status-in_transit,.status-picked_up{background:#422006;color:#fbbf24}
.empty-state{text-align:center;padding:40px 20px;color:#64748b}
.empty-state .icon{font-size:40px;margin-bottom:10px}
.summary-row{display:flex;gap:12px;margin-bottom:14px}
.summary-card{flex:1;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px;text-align:center}
.summary-card .num{font-size:24px;font-weight:900;color:#f8fafc}
.summary-card .lbl{font-size:10px;color:#64748b;margin-top:2px}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 20px;font-size:13px;color:#f8fafc;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:100;display:none;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Responsive ── */
@media(max-width:500px){.form-grid{grid-template-columns:1fr}.field.span-2{grid-column:span 1}.summary-row{flex-direction:column;gap:8px}}
</style>
</head>
<body>

<div class="top-bar">
  <h1>Manual Shipping</h1>
  <span class="badge">Flash Express</span>
</div>

<div class="tabs">
  <div class="tab active" data-tab="create" onclick="switchTab('create')">+ New</div>
  <div class="tab" data-tab="history" onclick="switchTab('history')">History</div>
</div>

<!-- ═══ TAB: CREATE ═══ -->
<div id="tab-create" class="content">

  <!-- Sender (hardcoded) -->
  <div class="card">
    <div class="card-title">
      <div class="icon" style="background:#1e3a5f;color:#60a5fa;">S</div>
      Sender (Hardcoded)
    </div>
    <div class="sender-info" id="sender-display">Loading...</div>
  </div>

  <!-- Recipient -->
  <div class="card">
    <div class="card-title">
      <div class="icon" style="background:#064e3b;color:#34d399;">R</div>
      Recipient
    </div>
    <div class="form-grid">
      <div class="field span-2">
        <label>Name *</label>
        <input type="text" id="dst_name" placeholder="BKK SHOP TEST">
      </div>
      <div class="field">
        <label>Phone *</label>
        <input type="tel" id="dst_phone" placeholder="0812345678">
      </div>
      <div class="field">
        <label>Postcode *</label>
        <input type="text" id="dst_postcode" placeholder="10540" maxlength="5">
      </div>
      <div class="field span-2">
        <label>Address *</label>
        <input type="text" id="dst_address" placeholder="54/80">
      </div>
      <div class="field">
        <label>District</label>
        <input type="text" id="dst_district" placeholder="Sub-district/District">
      </div>
      <div class="field">
        <label>City</label>
        <input type="text" id="dst_city" placeholder="City/Amphoe">
      </div>
      <div class="field span-2">
        <label>Province *</label>
        <input type="text" id="dst_province" placeholder="Province">
      </div>
    </div>
  </div>

  <!-- Parcel Info -->
  <div class="card">
    <div class="card-title">
      <div class="icon" style="background:#422006;color:#fbbf24;">P</div>
      Parcel
    </div>
    <div class="form-grid">
      <div class="field span-2">
        <label>Details / Product</label>
        <input type="text" id="item_desc" placeholder="Crash Bar Pro Rally Stainless XL750">
      </div>
      <div class="field">
        <label>Weight (g)</label>
        <input type="number" id="weight" value="1000" min="1" max="50000">
        <span class="hint">default 1000g = 1kg</span>
      </div>
      <div class="field">
        <label>Remark</label>
        <input type="text" id="remark" placeholder="Note / Order #">
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="btn-group">
    <button class="btn btn-primary" id="btn-create" onclick="createShipment()" style="flex:1">
      Create Flash Order + Print Label
    </button>
  </div>

  <!-- Result -->
  <div class="result-box" id="result-box">
    <div style="font-size:12px;margin-bottom:6px" id="result-msg"></div>
    <div class="pno" id="result-pno"></div>
  </div>

  <!-- Quick Actions after creation -->
  <div class="btn-group" id="post-actions" style="display:none">
    <button class="btn btn-ghost btn-sm" onclick="callCourier()">Call Courier</button>
    <button class="btn btn-ghost btn-sm" onclick="clearForm()">New Shipment</button>
  </div>
</div>

<!-- ═══ TAB: HISTORY ═══ -->
<div id="tab-history" class="content" style="display:none">

  <div class="shipments-header">
    <select class="month-select" id="month-select" onchange="loadShipments()"></select>
    <button class="btn btn-ghost btn-sm" onclick="loadShipments()">Refresh</button>
  </div>

  <div class="summary-row" id="summary-row">
    <div class="summary-card"><div class="num" id="sum-total">0</div><div class="lbl">Total</div></div>
    <div class="summary-card"><div class="num" id="sum-delivered">0</div><div class="lbl">Delivered</div></div>
    <div class="summary-card"><div class="num" id="sum-active">0</div><div class="lbl">Active</div></div>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <table class="ship-table">
      <thead>
        <tr>
          <th>PNO</th>
          <th>Recipient</th>
          <th>Details</th>
          <th>Date</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="shipments-body">
        <tr><td colspan="6" class="empty-state"><div class="icon">box</div>No shipments</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API_BASE = '';  // same origin (RPi dashboard)
const API_KEY = '{{ api_key }}';

// ── Sender info (hardcoded from config) ──
const SENDER = {
  name: {{ sender_name|tojson }},
  phone: {{ sender_phone|tojson }},
  address: {{ sender_address|tojson }}
};

let lastCreatedPno = '';

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('sender-display').innerHTML =
    `<b>${SENDER.name}</b><br>${SENDER.address}<br>Tel: ${SENDER.phone}`;
  populateMonthSelect();
});

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('tab-create').style.display = tab === 'create' ? '' : 'none';
  document.getElementById('tab-history').style.display = tab === 'history' ? '' : 'none';
  if (tab === 'history') loadShipments();
}

// ── Create Shipment ──
async function createShipment() {
  const btn = document.getElementById('btn-create');
  const fields = ['dst_name','dst_phone','dst_address','dst_province','dst_postcode'];
  const vals = {};
  for (const f of fields) {
    vals[f] = document.getElementById(f).value.trim();
    if (!vals[f]) {
      showToast(`Please fill ${f.replace('dst_','')}`);
      document.getElementById(f).focus();
      return;
    }
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creating...';

  const body = {
    dst_name: vals.dst_name,
    dst_phone: vals.dst_phone,
    dst_address: vals.dst_address,
    dst_district: document.getElementById('dst_district').value.trim(),
    dst_city: document.getElementById('dst_city').value.trim(),
    dst_province: vals.dst_province,
    dst_postcode: vals.dst_postcode,
    item_desc: document.getElementById('item_desc').value.trim(),
    weight: parseInt(document.getElementById('weight').value) || 1000,
    remark: document.getElementById('remark').value.trim(),
  };

  try {
    const res = await fetch(`${API_BASE}/api/manual-flash-create`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Print-Key': API_KEY },
      body: JSON.stringify(body),
    });
    const data = await res.json();

    const rb = document.getElementById('result-box');
    const rm = document.getElementById('result-msg');
    const rp = document.getElementById('result-pno');

    if (data.success) {
      rb.className = 'result-box';
      rb.style.display = '';
      rm.textContent = 'Flash order created + label printing...';
      rp.textContent = data.pno;
      lastCreatedPno = data.pno;
      document.getElementById('post-actions').style.display = '';
      showToast('Created: ' + data.pno);
    } else {
      rb.className = 'result-box error';
      rb.style.display = '';
      rm.textContent = 'Error';
      rp.textContent = data.message || 'Unknown error';
      document.getElementById('post-actions').style.display = 'none';
    }
  } catch (e) {
    showToast('Network error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Create Flash Order + Print Label';
  }
}

// ── Call Courier ──
async function callCourier() {
  if (!lastCreatedPno) { showToast('No PNO'); return; }
  showToast('Calling courier...');
  try {
    const res = await fetch(`${API_BASE}/api/manual-flash-ready`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Print-Key': API_KEY },
      body: JSON.stringify({ pno: lastCreatedPno }),
    });
    const data = await res.json();
    showToast(data.success ? 'Courier called!' : (data.message || 'Error'));
  } catch (e) {
    showToast('Error: ' + e.message);
  }
}

// ── Clear Form ──
function clearForm() {
  ['dst_name','dst_phone','dst_address','dst_district','dst_city','dst_province','dst_postcode','item_desc','remark'].forEach(f => {
    document.getElementById(f).value = '';
  });
  document.getElementById('weight').value = '1000';
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('post-actions').style.display = 'none';
  lastCreatedPno = '';
  document.getElementById('dst_name').focus();
}

// ── Month Select ──
function populateMonthSelect() {
  const sel = document.getElementById('month-select');
  const now = new Date();
  for (let i = 0; i < 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const val = d.getFullYear() + '_' + String(d.getMonth() + 1).padStart(2, '0');
    const lbl = d.toLocaleDateString('th-TH', { year: 'numeric', month: 'long' });
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = lbl;
    sel.appendChild(opt);
  }
}

// ── Load Shipments ──
async function loadShipments() {
  const month = document.getElementById('month-select').value;
  const tbody = document.getElementById('shipments-body');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px"><span class="spinner"></span></td></tr>';

  try {
    const res = await fetch(`${API_BASE}/api/manual-shipments?month=${month}`, {
      headers: { 'X-Print-Key': API_KEY },
    });
    const data = await res.json();

    if (!data.success || !data.shipments || data.shipments.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No shipments this month</td></tr>';
      updateSummary([]);
      return;
    }

    const rows = data.shipments.map((s, i) => {
      const canCancel = !['cancelled','delivered','picked_up','in_transit'].includes(s.status);
      return `
      <tr>
        <td class="pno-cell">${s.pno}</td>
        <td>${s.dst_name}<br><span style="font-size:10px;color:#64748b">${s.dst_phone || ''}</span></td>
        <td style="font-size:11px">${s.item_desc || s.remark || '-'}</td>
        <td style="font-size:11px;white-space:nowrap">${(s.created_at||'').split(' ')[0]}</td>
        <td><span class="status-badge status-${s.status}">${s.status}</span></td>
        <td style="white-space:nowrap">
          ${canCancel ? `<button class="btn btn-danger btn-sm" onclick="cancelOrder('${s.pno}')">Cancel</button>` : ''}
        </td>
      </tr>`;
    }).join('');
    tbody.innerHTML = rows;
    updateSummary(data.shipments);
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-state">Error: ${e.message}</td></tr>`;
  }
}

function updateSummary(shipments) {
  document.getElementById('sum-total').textContent = shipments.length;
  document.getElementById('sum-delivered').textContent = shipments.filter(s => s.status === 'delivered').length;
  document.getElementById('sum-active').textContent = shipments.filter(s => !['delivered','cancelled'].includes(s.status)).length;
}

// ── Cancel Order ──
async function cancelOrder(pno) {
  if (!confirm('ยกเลิกพัสดุ ' + pno + ' ?')) return;
  showToast('Cancelling...');
  try {
    const res = await fetch(`${API_BASE}/api/manual-flash-cancel`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Print-Key': API_KEY },
      body: JSON.stringify({ pno }),
    });
    const data = await res.json();
    showToast(data.success ? 'Cancelled!' : (data.message || 'Error'));
    if (data.success) loadShipments();
  } catch (e) {
    showToast('Error: ' + e.message);
  }
}

// ── Toast ──
function showToast(msg, dur = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = '';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.style.display = 'none', dur);
}
</script>

</body>
</html>
