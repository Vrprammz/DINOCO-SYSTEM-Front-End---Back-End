version: 2
updates:
  # Root package.json (frontend tooling: Jest, ESLint, Vite, Tailwind)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      eslint:
        patterns: ["eslint*", "@eslint/*"]
      jest:
        patterns: ["jest*", "@jest/*", "babel-jest*"]
      babel:
        patterns: ["@babel/*"]
      vite:
        patterns: ["vite", "@tailwindcss/*", "tailwindcss"]
    # Ignore major bumps for breaking-change tooling — surface as separate
    # PRs only when explicitly bumped.
    ignore:
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]

  # OpenClaw chatbot agent (separate package.json)
  - package-ecosystem: npm
    directory: "/openclawminicrm/proxy"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - openclaw

  - package-ecosystem: npm
    directory: "/openclawminicrm/smltrackdashboard"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - openclaw

  # PHP composer (PHPUnit + Yoast polyfills + Sentry SDK if added)
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - backend

  # GitHub Actions versions (actions/checkout@v4, setup-php, etc.)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
