name: Playwright E2E

on:
  push:
    branches: [main]
    paths:
      - "liff-src/**"
      - "tests/e2e/**"
      - "playwright.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/playwright.yml"
  pull_request:
    paths:
      - "liff-src/**"
      - "tests/e2e/**"
      - "playwright.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/playwright.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, mobile-chrome, webkit, mobile-safari]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browser for ${{ matrix.project }}
        # Per-project browser install — chromium covers both `chromium` +
        # `mobile-chrome` (same engine), webkit covers `webkit` +
        # `mobile-safari`.
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          case "${{ matrix.project }}" in
            chromium|mobile-chrome) npx playwright install chromium --with-deps ;;
            webkit|mobile-safari)   npx playwright install webkit --with-deps ;;
          esac

      - name: Install system deps for cached browsers
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          case "${{ matrix.project }}" in
            chromium|mobile-chrome) npx playwright install-deps chromium ;;
            webkit|mobile-safari)   npx playwright install-deps webkit ;;
          esac

      - name: Run Playwright (${{ matrix.project }})
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-playwright-${{ matrix.project }}
          path: junit-playwright.xml
          retention-days: 14
