name: PHPUnit

on:
  push:
    branches: [main]
    paths-ignore:
      # OpenClaw lives in its own repo subtree with its own CI (regression-guard.yml).
      # Avoid double-running phpunit on chatbot-only PRs.
      - "openclawminicrm/**"
      - "rpi-print-server/**"
      - "**.md"
      - ".obsidian/**"
  pull_request:
    paths-ignore:
      - "openclawminicrm/**"
      - "rpi-print-server/**"
      - "**.md"
      - ".obsidian/**"
  workflow_dispatch:

# Cancel in-flight runs for the same branch to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit suite (pure PHP)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: mbstring, json
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ hashFiles('composer.json') }}
          restore-keys: composer-

      - name: Install Composer dependencies (re-resolve dep graph)
        # `composer update --no-install` re-resolves dependency graph from composer.json
        # (handles new packages added since the committed lock was generated) and writes
        # a fresh lock. Then `composer install` actually downloads/extracts.
        # The two-step is safer than plain `composer install` because the committed lock
        # may predate dev deps added later (yoast/wp-test-utils etc.) and lock-strict
        # mode would reject the install.
        run: |
          composer update --no-install --no-interaction
          composer install --prefer-dist --no-progress --no-interaction

      - name: Run Unit suite
        run: ./vendor/bin/phpunit -c phpunit.xml.dist --log-junit junit-unit.xml

      - name: Upload Unit JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-unit
          path: junit-unit.xml
          retention-days: 14

  integration:
    name: Integration suite (WordPress + MySQL)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        # Fail-fast on lock contention so concurrent tests don't hang the runner.
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      WP_TESTS_DIR: /tmp/wordpress-tests-lib

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: mysqli, mbstring, json
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ hashFiles('composer.json') }}
          restore-keys: composer-

      - name: Install Composer dependencies (re-resolve dep graph)
        # `composer update --no-install` re-resolves dependency graph from composer.json
        # (handles new packages added since the committed lock was generated) and writes
        # a fresh lock. Then `composer install` actually downloads/extracts.
        # The two-step is safer than plain `composer install` because the committed lock
        # may predate dev deps added later (yoast/wp-test-utils etc.) and lock-strict
        # mode would reject the install.
        run: |
          composer update --no-install --no-interaction
          composer install --prefer-dist --no-progress --no-interaction

      - name: Install subversion (required for wordpress-develop checkout)
        # ubuntu-latest 24.04+ doesn't ship `svn` by default; the WP test
        # installer uses `svn co` to fetch /tests/phpunit/{includes,data}.
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Cache WordPress core + test library
        uses: actions/cache@v4
        with:
          # Cache BOTH paths — installer's early-return checks both,
          # otherwise WP core gets re-downloaded every run.
          path: |
            /tmp/wordpress
            /tmp/wordpress-tests-lib
          key: wp-tests-latest-${{ runner.os }}-v2

      - name: Install / refresh wordpress-develop test suite
        run: |
          # MySQL service container creates the DB already (MYSQL_DATABASE env).
          # Pass skip-database-creation=true so the installer doesn't try to recreate it.
          # Script is idempotent — when both /tmp/wordpress + /tmp/wordpress-tests-lib
          # exist (cache hit), it returns early without re-downloading.
          bash bin/install-wp-tests.sh wordpress_test root '' 127.0.0.1 latest true

      - name: Set MySQL lock-wait timeout (fail-fast on contention)
        run: |
          mysql -h 127.0.0.1 -u root -e "SET GLOBAL innodb_lock_wait_timeout=5;" || true

      - name: Schema parity check
        run: php scripts/verify-schema-parity.php

      - name: Run Integration suite
        run: ./vendor/bin/phpunit -c phpunit.integration.xml --log-junit junit-integration.xml

      - name: Upload Integration JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-integration
          path: junit-integration.xml
          retention-days: 14

      - name: Publish JUnit results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: "junit-*.xml"
          check_name: "PHPUnit Results"
          require_tests: true
