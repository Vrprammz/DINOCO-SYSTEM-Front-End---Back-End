name: Security Audit

on:
  schedule:
    # Mondays 09:00 ICT (02:00 UTC) — fresh CVE feed at week start
    - cron: "0 2 * * 1"
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "composer.json"
      - "composer.lock"
      - ".github/workflows/security-audit.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm audit (production deps)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Audit production deps (fail on high/critical)
        # --omit=dev limits to runtime deps. Dev tooling vulns
        # (Jest/ESLint/Vite) are surfaced separately and don't ship.
        # Exit code: 0 if no vulns, non-zero if found at audit-level or above.
        run: npm audit --omit=dev --audit-level=high

      - name: Audit dev deps (informational, never fails)
        if: always()
        run: npm audit --audit-level=high || true

  composer-audit:
    name: composer audit (PHP deps)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: mbstring, json
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer update --no-install --no-interaction && composer install --prefer-dist --no-progress --no-interaction

      - name: composer audit (fail on high/critical advisories)
        # `--abandoned=ignore` silences abandoned-package warnings;
        # SECURITY advisories still trigger non-zero exit on high/critical.
        run: composer audit --abandoned=ignore || (composer audit --abandoned=ignore --format=json | python3 -c "import json,sys; d=json.load(sys.stdin); has_critical=any(a.get('severity','').lower() in ('high','critical') for advs in d.get('advisories',{}).values() for a in advs); sys.exit(1 if has_critical else 0)")
