name: Frontend (Jest + ESLint)

on:
  push:
    branches: [main]
    paths:
      - "liff-src/**"
      - "tests/jest/**"
      - "docs/api/openapi.yaml"
      - "package.json"
      - "package-lock.json"
      - "babel.config.json"
      - "jest.config.js"
      - "eslint.config.js"
      - ".github/workflows/jest.yml"
  pull_request:
    paths:
      - "liff-src/**"
      - "tests/jest/**"
      - "docs/api/openapi.yaml"
      - "package.json"
      - "package-lock.json"
      - "babel.config.json"
      - "jest.config.js"
      - "eslint.config.js"
      - ".github/workflows/jest.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jest:
    name: Jest unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest
        run: npx jest --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_FILE: ./junit-jest.xml

      - name: Upload Jest JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-jest
          path: junit-jest.xml
          retention-days: 14
