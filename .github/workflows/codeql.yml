name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Mondays 03:00 ICT (20:00 UTC Sunday) — fresh CodeQL pack updates
    - cron: "0 20 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
        # Note: PHP CodeQL is supported but our PHP is in WP Code Snippets
        # (no <?php tag at line 1, eval'd at runtime) which CodeQL can't
        # parse out of the box. Frontend JS is the high-value scan target.

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # Limit scan scope — skip the PHP-embedded JS in WP snippets
          # (CodeQL can't understand them anyway).

      - name: Filter scan to actual JS source
        # Skip vendor/node_modules/dist/coverage + WP snippet files (PHP).
        # Without this filter CodeQL takes 8-15 min and produces noise from
        # bundled deps. With it, ~3 min and only our code.
        run: |
          cat > .codeqlignore << 'EOF'
          node_modules/**
          openclawminicrm/**/node_modules/**
          vendor/**
          dist/**
          coverage/**
          .obsidian/**
          dinoco-catalog-*/**
          **/*.min.js
          **/*.bundle.js
          EOF

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
