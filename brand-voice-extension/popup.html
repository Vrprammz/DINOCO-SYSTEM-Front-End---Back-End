<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Voice</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 380px; min-height: 200px; max-height: 580px;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  background: #f8fafc; color: #334155; font-size: 13px;
  overflow-y: auto;
}

/* Header */
.header {
  background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
  color: #fff; padding: 14px 16px; display: flex; align-items: center; gap: 10px;
}
.header-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.header-sub { font-size: 11px; opacity: 0.8; }

/* Setup screen */
.setup { padding: 20px 16px; text-align: center; }
.setup h3 { font-size: 15px; margin-bottom: 12px; color: #1e40af; }
.setup input {
  width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px;
  font-size: 13px; margin-bottom: 8px;
}
.setup input:focus { outline: none; border-color: #3b82f6; }
.setup .hint { font-size: 11px; color: #94a3b8; margin-bottom: 12px; }

/* Form */
.form { padding: 12px 16px; display: none; }
.form.active { display: block; }

.field { margin-bottom: 10px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 3px; }
.field textarea, .field input[type="text"], .field select {
  width: 100%; padding: 7px 10px; border: 1px solid #e2e8f0; border-radius: 6px;
  font-size: 13px; background: #fff; color: #334155;
}
.field textarea { resize: vertical; min-height: 60px; font-family: inherit; }
.field textarea:focus, .field input:focus, .field select:focus { outline: none; border-color: #3b82f6; }

/* Chip group */
.chips { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  padding: 3px 8px; border-radius: 5px; font-size: 11px; cursor: pointer;
  background: #fff; border: 1px solid #e2e8f0; color: #64748b; user-select: none;
  transition: all .12s;
}
.chip:hover { border-color: #94a3b8; }
.chip.selected { background: #3b82f6; color: #fff; border-color: #3b82f6; font-weight: 600; }

/* Sentiment */
.sent-group { display: flex; gap: 4px; }
.sent-btn {
  flex: 1; text-align: center; padding: 6px 2px; border-radius: 6px; cursor: pointer;
  font-size: 11px; font-weight: 600; border: 2px solid #e2e8f0; transition: all .12s;
}
.sent-btn:hover { border-color: #94a3b8; }
.sent-btn.s-positive { color: #16a34a; }
.sent-btn.s-positive.active { background: rgba(22,163,74,.1); border-color: #16a34a; }
.sent-btn.s-neutral { color: #64748b; }
.sent-btn.s-neutral.active { background: rgba(100,116,139,.1); border-color: #64748b; }
.sent-btn.s-negative { color: #dc2626; }
.sent-btn.s-negative.active { background: rgba(220,38,38,.1); border-color: #dc2626; }
.sent-btn.s-mixed { color: #d97706; }
.sent-btn.s-mixed.active { background: rgba(217,119,6,.1); border-color: #d97706; }

/* Source info bar */
.source-bar {
  background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px;
  padding: 8px 10px; margin-bottom: 10px; font-size: 11px; color: #1e40af;
  display: flex; align-items: center; gap: 6px;
}
.source-bar .plat-icon { font-size: 14px; }

/* Buttons */
.btn {
  padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; transition: all .12s; width: 100%;
}
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-secondary { background: #f1f5f9; color: #334155; border: 1px solid #e2e8f0; margin-top: 6px; }
.btn-secondary:hover { background: #e2e8f0; }

/* Status */
.status { padding: 12px 16px; text-align: center; display: none; }
.status.active { display: block; }
.status-success { color: #16a34a; }
.status-error { color: #dc2626; }
.status h3 { font-size: 16px; margin-bottom: 4px; }
.status p { font-size: 12px; color: #64748b; }

/* Settings link */
.settings-bar {
  padding: 8px 16px; border-top: 1px solid #e2e8f0;
  display: flex; justify-content: space-between; align-items: center;
}
.settings-bar a { font-size: 11px; color: #3b82f6; cursor: pointer; text-decoration: none; }
.settings-bar .connected { font-size: 11px; color: #16a34a; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-logo">DINOCO Brand Voice</div>
    <div class="header-sub">เก็บเสียงลูกค้าจากโซเชียล</div>
  </div>
</div>

<!-- Setup Screen -->
<div class="setup" id="setup-screen">
  <h3>ตั้งค่าครั้งแรก</h3>
  <p style="font-size:12px;color:#64748b;margin-bottom:12px;">ใส่ข้อมูลเชื่อมต่อกับ WordPress</p>
  <input type="text" id="setup-url" placeholder="URL เว็บ เช่น https://dinoco.in.th" />
  <input type="text" id="setup-key" placeholder="API Key (bvk_...)" />
  <div class="hint">สร้าง API Key ได้ที่หน้า Brand Voice → tab Bookmarklet</div>
  <button class="btn btn-primary" id="setup-save">เชื่อมต่อ</button>
</div>

<!-- Main Form -->
<div class="form" id="main-form">

  <!-- Source info -->
  <div class="source-bar" id="source-bar">
    <span class="plat-icon" id="plat-icon"></span>
    <span id="source-label">กำลังโหลด...</span>
  </div>

  <!-- Content -->
  <div class="field">
    <label>ข้อความ</label>
    <textarea id="f-content" rows="3" placeholder="เลือกข้อความจากหน้าเว็บ หรือพิมพ์เอง..."></textarea>
  </div>

  <!-- Summary -->
  <div class="field">
    <label>สรุปย่อ</label>
    <input type="text" id="f-summary" placeholder="สรุป 1 บรรทัด" />
  </div>

  <!-- Brands -->
  <div class="field">
    <label>แบรนด์</label>
    <div class="chips" id="f-brands"></div>
  </div>

  <!-- Sentiment -->
  <div class="field">
    <label>Sentiment</label>
    <div class="sent-group" id="f-sentiment">
      <div class="sent-btn s-positive" data-val="positive">Positive</div>
      <div class="sent-btn s-neutral active" data-val="neutral">Neutral</div>
      <div class="sent-btn s-negative" data-val="negative">Negative</div>
      <div class="sent-btn s-mixed" data-val="mixed">Mixed</div>
    </div>
  </div>

  <!-- Categories -->
  <div class="field">
    <label>หมวดหมู่</label>
    <div class="chips" id="f-categories"></div>
  </div>

  <!-- Models -->
  <div class="field">
    <label>รุ่นรถ</label>
    <div class="chips" id="f-models"></div>
  </div>

  <!-- Tags -->
  <div class="field">
    <label>Tags</label>
    <input type="text" id="f-tags" placeholder="คั่นด้วย comma" />
  </div>

  <!-- Submit -->
  <button class="btn btn-primary" id="btn-save">บันทึก Brand Voice</button>
  <button class="btn btn-secondary" id="btn-save-next">บันทึก & เก็บต่อ</button>
</div>

<!-- Success/Error -->
<div class="status" id="status-screen">
  <h3 id="status-title"></h3>
  <p id="status-message"></p>
  <button class="btn btn-secondary" id="btn-back" style="margin-top:12px;">เก็บเสียงเพิ่ม</button>
</div>

<!-- Settings bar -->
<div class="settings-bar" id="settings-bar" style="display:none;">
  <span class="connected" id="conn-status"></span>
  <a id="btn-reset">ตั้งค่าใหม่</a>
</div>

<script src="popup.js"></script>
</body>
</html>
