<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Brand Voice</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 380px; min-height: 200px;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  background: #f8fafc; color: #334155; font-size: 13px;
}

.header {
  background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
  color: #fff; padding: 14px 16px;
}
.header-logo { font-size: 18px; font-weight: 800; }
.header-sub { font-size: 11px; opacity: 0.8; }

/* Setup */
.setup { padding: 20px 16px; text-align: center; }
.setup h3 { font-size: 15px; margin-bottom: 12px; color: #1e40af; }
.setup input {
  width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px;
  font-size: 13px; margin-bottom: 8px;
}
.setup input:focus { outline: none; border-color: #3b82f6; }
.setup .hint { font-size: 11px; color: #94a3b8; margin-bottom: 12px; }

/* Main */
.main { padding: 16px; display: none; }
.main.active { display: block; }

.source-bar {
  background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px;
  padding: 12px 14px; margin-bottom: 14px;
}
.source-bar .plat { font-size: 14px; font-weight: 700; color: #1e40af; margin-bottom: 4px; }
.source-bar .info { font-size: 11px; color: #475569; }

.big-btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  font-size: 15px; font-weight: 700; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: inherit;
}
.big-btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: #fff; }
.big-btn-primary:hover { box-shadow: 0 4px 12px rgba(59,130,246,.4); }
.big-btn-primary:disabled { opacity: .5; cursor: not-allowed; }

/* Progress */
.progress { display: none; margin-top: 14px; }
.progress.active { display: block; }
.progress-bar-wrap {
  height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-bottom: 8px;
}
.progress-bar {
  height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 4px;
  transition: width .3s;
}
.progress-text { font-size: 12px; color: #64748b; text-align: center; }

/* Results */
.results { display: none; margin-top: 14px; }
.results.active { display: block; }
.result-summary {
  background: #f0fdf4; border: 1px solid #86efac; border-radius: 10px;
  padding: 14px; text-align: center; margin-bottom: 10px;
}
.result-summary.error { background: #fef2f2; border-color: #fca5a5; }
.result-num { font-size: 28px; font-weight: 800; color: #16a34a; }
.result-label { font-size: 12px; color: #475569; margin-top: 2px; }

.result-list { max-height: 250px; overflow-y: auto; }
.result-item {
  padding: 8px 10px; border-bottom: 1px solid #f1f5f9; font-size: 12px;
  display: flex; gap: 8px; align-items: flex-start;
}
.result-item:last-child { border-bottom: none; }
.result-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.result-text { flex: 1; }
.result-author { font-weight: 600; color: #334155; }
.result-summary-text { color: #64748b; margin-top: 2px; }
.result-badges { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 3px; }
.badge {
  padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600;
}
.badge-pos { background: #dcfce7; color: #16a34a; }
.badge-neg { background: #fef2f2; color: #dc2626; }
.badge-neu { background: #f1f5f9; color: #64748b; }
.badge-mix { background: #fefce8; color: #d97706; }
.badge-brand { background: #dbeafe; color: #1e40af; }
.badge-skip { background: #f1f5f9; color: #94a3b8; }

/* Settings */
.settings-bar {
  padding: 8px 16px; border-top: 1px solid #e2e8f0;
  display: flex; justify-content: space-between; align-items: center;
}
.settings-bar a { font-size: 11px; color: #3b82f6; cursor: pointer; text-decoration: none; }
.settings-bar .connected { font-size: 11px; color: #16a34a; }

.btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; width: 100%; margin-top: 8px; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-secondary { background: #f1f5f9; color: #334155; border: 1px solid #e2e8f0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">DINOCO Brand Voice</div>
  <div class="header-sub">เก็บเสียงลูกค้า — กดปุ่มเดียว AI ทำให้หมด</div>
</div>

<!-- Setup -->
<div class="setup" id="setup-screen">
  <h3>ตั้งค่าครั้งแรก</h3>
  <input type="text" id="setup-url" placeholder="URL เว็บ เช่น https://dinoco.in.th" />
  <input type="text" id="setup-key" placeholder="API Key (bvk_...)" />
  <div class="hint">สร้าง API Key ที่หน้า Brand Voice → tab Bookmarklet</div>
  <button class="btn btn-primary" id="setup-save">เชื่อมต่อ</button>
</div>

<!-- Main -->
<div class="main" id="main-screen">
  <div class="source-bar">
    <div class="plat" id="source-plat">กำลังอ่านหน้าเว็บ...</div>
    <div class="info" id="source-info"></div>
  </div>

  <button class="big-btn big-btn-primary" id="btn-collect">
    <span style="font-size:20px;">&#9889;</span> เก็บเสียงลูกค้าทั้งโพสต์
  </button>

  <div class="progress" id="progress">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text">กำลังอ่านโพสต์...</div>
  </div>

  <div class="results" id="results">
    <div class="result-summary" id="result-summary">
      <div class="result-num" id="result-num">0</div>
      <div class="result-label" id="result-label">entries บันทึกสำเร็จ</div>
    </div>
    <div class="result-list" id="result-list"></div>
    <button class="btn btn-secondary" id="btn-done">เสร็จแล้ว</button>
  </div>
</div>

<div class="settings-bar" id="settings-bar" style="display:none;">
  <span class="connected" id="conn-status"></span>
  <a id="btn-reset">ตั้งค่าใหม่</a>
</div>

<script src="popup.js"></script>
</body>
</html>
