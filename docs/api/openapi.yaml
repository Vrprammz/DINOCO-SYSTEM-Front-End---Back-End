    get:
      tags: [SN-Admin]
      summary: Customer LTV detail (V.0.12 — claims + reviews + cross-sell)
      description: |
        Drill-down detail for one customer. Returns user info + LTV snapshot +
        owned plates + claim history + review history + cross-sell suggestion.
        PII masked unless caller has dinoco_sn_view_pii capability.

        V.0.12 (2026-05-05) — extended response with claims[], reviews[],
        cross_sell{}. claim_ticket integration uses WP_Query author filter
        with update_meta_cache priming (Round 15 ITEM A pattern). reviews
        sourced from wp_dinoco_sn_review_requests. cross_sell currently
        returns owned_distinct count only — Phase 4 W14 ML collaborative
        filter on tier peers deferred to OpenClaw chatbot refactor.
      parameters:
        - { name: user_id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: LTV detail with plates + claims + reviews + cross-sell
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      user_id: { type: integer }
                      display_name: { type: string }
                      email: { type: string, description: "Masked unless caller has dinoco_sn_view_pii cap" }
                      registered_at: { type: string, format: date-time }
