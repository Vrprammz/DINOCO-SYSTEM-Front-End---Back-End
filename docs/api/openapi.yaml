                        sent_at: { type: string, nullable: true }
                        reviewed_at: { type: string, nullable: true }
                  cross_sell:
                    type: object
                    description: Phase 4 W14 ML stub — currently owned_distinct count only
                    properties:
                      owned_distinct: { type: integer }
                      note: { type: string }
                  pii_visible: { type: boolean }
                  fetched_at: { type: string, format: date-time }
        "404": { description: User not found }
