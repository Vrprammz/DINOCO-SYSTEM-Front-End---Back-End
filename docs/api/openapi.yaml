      summary: Audit log search (filterable timeline)
      parameters:
        - { name: sn, in: query, schema: { type: string } }
        - { name: event_type, in: query, schema: { type: string } }
        - { name: actor_id, in: query, schema: { type: integer } }
        - { name: days, in: query, schema: { type: integer, default: 30 } }
      responses:
        "200": { description: Audit events }

  /dinoco-sn/v1/pool-stats:
    get:
      tags: [SN-Admin]
      summary: Heatmap counters per linked_sku × status (60s cached)
      responses:
        "200": { description: Pool stats with totals + 200-SKU breakdown }

  /dinoco-sn/v1/void:
    post:
      tags: [SN-Admin]
      summary: Void single S/N (auto-tier in_pool/reserved only — Phase 3 stub)
      description: registered/claimed status returns 422 (Phase 4 W11 4-eyes promotion)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sn, reason]
              properties:
                sn: { type: string }
                reason: { type: string, minLength: 10 }
      responses:
        "200": { description: Voided }
        "422": { description: Requires 4-eyes approval }

  /dinoco-sn/v1/swap:
    post:
      tags: [SN-Admin]
      summary: Swap sn_old → sn_new (same SKU, GET_LOCK + atomic dual UPDATE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sn_old, sn_new, reason]
              properties:
                sn_old: { type: string }
                sn_new: { type: string }
                reason: { type: string, minLength: 10 }
      responses:
        "200": { description: Swap complete }

  /dinoco-sn/v1/recall:
    post:
      tags: [SN-Admin]
      summary: Defect/safety/stolen/fraud/misship recall
      description: 5-category whitelist. is_sensitive=1 (5y retention).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sn, reason]
              properties:
                sn: { type: string }
                category: { type: string, enum: [defect, safety, stolen, fraud, misship] }
                reason: { type: string, minLength: 10 }
      responses:
        "200": { description: Recalled }

  /dinoco-sn/v1/reissue:
    post:
      tags: [SN-Admin]
      summary: M2 plate-fell-off — issue replacement (same SKU, customer keeps proof)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sn_old, sn_new, reason]
              properties:
                sn_old: { type: string }
                sn_new: { type: string }
                reason: { type: string, minLength: 10 }
      responses:
        "200": { description: Reissue complete (admin must arrange physical shipment) }

  /dinoco-sn/v1/reconcile-report:
    get:
      tags: [SN-Admin]
      summary: Weekly batch drift report (qty_received vs actual count)
      responses:
        "200": { description: Drift report rows }

  /dinoco-sn/v1/required-plates:
    post:
