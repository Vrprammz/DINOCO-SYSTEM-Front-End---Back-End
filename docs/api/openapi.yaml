          application/json:
            schema:
              type: object
              required: [sku, qty]
              properties:
                sku: { type: string }
                qty: { type: integer, minimum: 1 }
      responses:
        "200": { description: Required plates per leaf }

  /dinoco-sn/v1/ltv/list:
    get:
      tags: [SN-Admin]
      summary: Top customers by lifetime spend (paginated)
      parameters:
