                        sn: { type: string, description: "From warranty_serial → serial_code fallback (backward compat)" }
                        product_name: { type: string }
                        created_at: { type: string }
                  reviews:
                    type: array
                    description: Top 20 review_requests for this user (sent/reviewed)
                    items:
                      type: object
                      properties:
                        review_request_id: { type: integer }
                        sn: { type: string }
