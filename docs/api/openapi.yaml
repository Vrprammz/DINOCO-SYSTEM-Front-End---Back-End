                      claim_count: { type: integer }
                      loyalty_tier: { type: string, enum: [bronze, silver, gold, platinum, diamond] }
                  plates:
                    type: array
                    description: Top 50 most recent plates registered to this user
                    items:
                      type: object
                      properties:
                        sn: { type: string }
                        status: { type: string }
                        linked_sku: { type: string, nullable: true }
                        registered_at: { type: string }
                  claims:
                    type: array
                    description: Top 20 recent claim_ticket CPT entries (post_author filter)
                    items:
                      type: object
                      properties:
                        claim_id: { type: integer }
