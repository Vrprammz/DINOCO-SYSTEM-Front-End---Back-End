  #
  # GDPR (scaffold)
  #
  /dinoco-gdpr/v1/dsr/export:
    post:
      tags: [GDPR]
      summary: Data subject access request — export
      description: |
        Scaffold endpoint. User requests all data DINOCO holds about them
        (warranty registrations, claims, LINE UID mapping, chat logs).
        Returns job_id — async export.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_id, verification_token]
              properties:
                subject_id: { type: string, description: LINE UID or phone or email }
                verification_token: { type: string }
      responses:
        "202":
          description: Export job queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string }
                  estimated_ready_at: { type: string, format: date-time }

  /dinoco-gdpr/v1/dsr/delete:
    post:
      tags: [GDPR]
      summary: Data subject access request — erasure
      description: |
        Scaffold endpoint. Queues asynchronous data deletion with
        reversible soft-delete + 30-day final purge. Audit-logged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_id, verification_token, confirm]
              properties:
                subject_id: { type: string }
                verification_token: { type: string }
                confirm: { type: boolean, enum: [true] }
      responses:
        "202": { description: Erasure scheduled (30-day grace) }
        "403": { $ref: "#/components/responses/Forbidden" }

  /dinoco-gdpr/v1/dsr/status:
    get:
      tags: [GDPR]
      summary: Check DSR job status
      parameters:
        - name: job_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Job progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string }
                  status:
                    type: string
                    enum: [queued, running, completed, failed, cancelled]
                  download_url: { type: string, nullable: true }

  #
  # S/N Management System — admin namespace (Phase 0-4 of v2.13)
  # See plan: ~/.claude/plans/wiki-doc-sequential-lantern.md (v2.13)
  #
  /dinoco-sn/v1/version:
    get:
      tags: [SN-Admin]
      summary: Health check + version + phase
      security: []
      responses:
        "200":
          description: System metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version: { type: string }
                  schema_version: { type: string }
                  enabled: { type: boolean }
                  phase: { type: string }

  /dinoco-sn/v1/batches:
    get:
      tags: [SN-Admin]
      summary: List batches (paginated)
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [draft, sent_to_factory, received_partial, received_full, closed, cancelled] } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
      responses:
        "200": { description: Batch list }
    post:
      tags: [SN-Admin]
      summary: Create batch + reserve N S/N rows atomically
      description: |
        Idempotent via X-Idempotency-Key (Round 30+ pattern).
        Atomic: GET_LOCK on prefix + START TRANSACTION + chunked INSERT 5000/iter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [batch_code, prefix, qty_total, format_pattern]
              properties:
                batch_code: { type: string, maxLength: 64 }
                prefix: { type: string, pattern: '^[A-Z0-9]{3,6}$' }
                qty_total: { type: integer, minimum: 1, maximum: 1000000 }
                format_pattern: { type: string, example: '{PREFIX}{SEQ:7}' }
                allocation_strategy: { type: string, enum: [open_pool, pre_assigned] }
                factory_name: { type: string }
                factory_po_ref: { type: string }
                notes: { type: string }
      responses:
        "201": { description: Batch created }
        "409": { description: Duplicate batch_code or idempotency conflict }

  /dinoco-sn/v1/batches/{id}:
    get:
      tags: [SN-Admin]
      summary: Batch detail with progress
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Batch detail }
        "404": { description: Not found }

  /dinoco-sn/v1/batches/{id}/status:
    post:
      tags: [SN-Admin]
      summary: Flip batch status (admin)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Status updated }

  /dinoco-sn/v1/batches/{id}/csv:
    get:
      tags: [SN-Admin]
      summary: Download CSV S/N list (chunked stream)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: CSV file
          content: { text/csv: { schema: { type: string, format: binary } } }

  /dinoco-sn/v1/batches/{id}/qr-pdf:
    get:
      tags: [SN-Admin]
      summary: Download QR PDF (chunked 5000/file)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: chunk, in: query, schema: { type: integer, default: 1 } }
      responses:
        "200":
          description: PDF file
          content: { application/pdf: { schema: { type: string, format: binary } } }

  /dinoco-sn/v1/receive:
    post:
      tags: [SN-Admin]
      summary: Receive single S/N (USB scan / manual)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sn, batch_id, sku]
              properties:
                sn: { type: string }
                batch_id: { type: integer }
                sku: { type: string }
                mode: { type: string, enum: [usb, range, paste], default: usb }
      responses:
        "200": { description: Plate received }
        "409": { description: Already received or status conflict }

  /dinoco-sn/v1/receive/bulk:
    post:
      tags: [SN-Admin]
      summary: Bulk receive Range/Paste mode (D4 contract)
      description: |
        Per-row atomic + skip-conflicts default. Chunk cap 100 plates per request.
        Idempotency body hash uses sort(sns) for determinism (Round 27 pattern).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sns, batch_id, sku, mode]
              properties:
                sns: { type: array, items: { type: string } }
                batch_id: { type: integer }
                sku: { type: string }
                mode: { type: string, enum: [range, paste] }
      responses:
        "200":
          description: Bulk receive results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success_count: { type: integer }
                  skip_count: { type: integer }
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        sn: { type: string }
                        status: { type: string, enum: [ok, skip] }
                        code: { type: string }

  /dinoco-sn/v1/lookup/{sn}:
    get:
      tags: [SN-Admin]
      summary: Public lookup — minimal status oracle (60s cache, rate-limited)
      description: |
        PII-stripped (no SKU / no user_id / no ownership oracle).
        Audit fix Round 26: only returns {sn, public_status, is_registered, activate_hint}.
      security: []
      parameters:
        - { name: sn, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Lookup result }
        "404": { description: S/N not found }
        "410": { description: Voided / recalled — generic message }

  /dinoco-sn/v1/sn/{sn}:
    get:
      tags: [SN-Admin]
      summary: Detail card (full timeline + meta + audit slice)
      parameters:
        - { name: sn, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: SN detail }

  /dinoco-sn/v1/sc-lookup/{sn}:
    get:
      tags: [SN-Admin]
      summary: Service Center walk-in verify (warehouse cap accepted)
      description: Same payload as /sn/{sn} but accepts dinoco_sn_warehouse capability.
      parameters:
        - { name: sn, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: SN detail (PII auto-masked unless view_pii cap) }

  /dinoco-sn/v1/search:
    get:
      tags: [SN-Admin]
      summary: Universal admin search across sn_pool
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: batch_id, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
      responses:
        "200": { description: Search results paginated }

  /dinoco-sn/v1/audit:
    get:
