<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>DINOCO E2E — place-order full flow</title>
</head>
<body>
    <div id="app">
        <h1>B2B Place-Order Flow</h1>
        <p>Stage: <span id="stage">init</span></p>
        <p>Status: <span id="status">—</span></p>
        <p>Session token: <code id="session-token">—</code></p>
        <p>Items: <span id="item-count">0</span> · Total: ฿<span id="total">0</span></p>
        <ul id="items"></ul>
        <p id="error" style="color:red"></p>
        <p id="result" style="color:green"></p>

        <button id="btn-auth">1. Authenticate</button>
        <button id="btn-add" disabled>2. Add SKU-A × 2</button>
        <button id="btn-add-more" disabled>+ Add SKU-B × 1</button>
        <button id="btn-submit" disabled>3. Place Order</button>
    </div>

    <!--
      Mock window.liff BEFORE importing liff-init / liff-auth modules.
      This reproduces what the LINE LIFF SDK provides at runtime.
    -->
    <script>
        window.liff = {
            init: async (config) => {
                window.__lastLiffInit = config;
            },
            isLoggedIn: () => true,
            getIDToken: () => "mock-id-token-from-line",
            getContext: () => ({ type: "utou", groupId: null }),
            getProfile: async () => ({
                userId: "U-mock-user-99",
                displayName: "Mock User",
                pictureUrl: "https://example.com/pic.jpg",
            }),
            isInClient: () => true,
            getOS: () => "ios",
            login: () => {
                throw new Error("login() called — should not happen if isLoggedIn=true");
            },
            closeWindow: () => {},
        };
    </script>

    <script type="module">
        import { liffAuth } from "/liff-src/shared/liff-auth.js";
        import { createB2BApi } from "/liff-src/shared/api-client.js";
        import {
            createCart,
            addToCart,
            computeTotal,
            computeItemCount,
            toOrderItems,
        } from "/liff-src/shared/cart.js";

        // ── State ──────────────────────────────────────────────────
        let session = null;
        let api = null;
        let cart = createCart();
        const PRICE_MAP = { "SKU-A": 100, "SKU-B": 250 };

        // ── DOM helpers ────────────────────────────────────────────
        const $ = (id) => document.getElementById(id);
        function setStage(s) {
            $("stage").textContent = s;
        }
        function setStatus(s) {
            $("status").textContent = s;
        }
        function showError(e) {
            $("error").textContent = e;
        }
        function showResult(r) {
            $("result").textContent = r;
        }
        function renderCart() {
            const items = $("items");
            items.innerHTML = "";
            for (const sku of Object.keys(cart.items)) {
                const li = document.createElement("li");
                li.dataset.sku = sku;
                const entry = cart.items[sku];
                const unit = PRICE_MAP[sku] || 0;
                li.textContent = `${sku} × ${entry.qty} = ฿${unit * entry.qty}`;
                items.appendChild(li);
            }
            $("item-count").textContent = String(computeItemCount(cart));
            $("total").textContent = String(computeTotal(cart, PRICE_MAP));
        }

        // ── Step 1: Authenticate ───────────────────────────────────
        $("btn-auth").addEventListener("click", async () => {
            setStage("authenticating");
            showError("");
            try {
                const result = await liffAuth({
                    liffId: "1234567890-MockLiffId",
                    authEndpoint: "/wp-json/b2b/v1/auth",
                    extra: { distributor_id: 42 },
                });
                if (!result || !result.authorized) {
                    throw new Error("auth response missing authorized=true");
                }
                session = result;
                $("session-token").textContent = result.token || "—";
                api = createB2BApi({
                    base: "/wp-json/b2b/v1",
                    sessionToken: result.token,
                });
                setStage("authenticated");
                setStatus("ready");
                $("btn-add").disabled = false;
                $("btn-add-more").disabled = false;
            } catch (err) {
                setStage("auth_failed");
                showError(`auth: ${err.message} (status=${err.status || "n/a"})`);
            }
        });

        // ── Step 2: Add to cart ───────────────────────────────────
        $("btn-add").addEventListener("click", () => {
            cart = addToCart(cart, "SKU-A", 2);
            renderCart();
            $("btn-submit").disabled = false;
        });
        $("btn-add-more").addEventListener("click", () => {
            cart = addToCart(cart, "SKU-B", 1);
            renderCart();
            $("btn-submit").disabled = false;
        });

        // ── Step 3: Place order ───────────────────────────────────
        $("btn-submit").addEventListener("click", async () => {
            setStage("submitting");
            showError("");
            showResult("");
            try {
                const payload = {
                    items: toOrderItems(cart),
                    note: "E2E test order",
                };
                window.__lastSubmitPayload = payload;
                const r = await api.placeOrder(payload);
                setStage("submitted");
                setStatus("ok");
                showResult(`order_id=${r.order_id} total=฿${r.total || ""}`);
            } catch (err) {
                setStage("submit_failed");
                setStatus("error");
                showError(`submit: ${err.message} (status=${err.status || "n/a"})`);
            }
        });

        setStage("idle");
    </script>
</body>
</html>
