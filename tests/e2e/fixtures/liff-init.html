<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>DINOCO E2E — liff-init fixture</title>
</head>
<body>
    <div id="app">
        <h1>liff-init fixture</h1>
        <p>Mode: <span id="mode">—</span></p>
        <p>Result: <span id="result">—</span></p>
        <p>Login called: <span id="login-called">false</span></p>
        <p>Login redirectUri: <code id="redirect-uri">—</code></p>
        <pre id="ctx"></pre>
        <button id="btn-init">initLiff(LIFF_ID)</button>
    </div>

    <script>
        // Mode controlled via URL hash:
        //   #logged-in   — happy path (returns ctx)
        //   #logged-out  — login redirect path (returns null + calls login())
        //   #no-sdk      — error path (window.liff missing)
        const mode = window.location.hash.replace("#", "") || "logged-in";
        document.getElementById("mode").textContent = mode;

        if (mode !== "no-sdk") {
            window.__loginCalls = [];
            window.liff = {
                init: async () => {},
                isLoggedIn: () => mode === "logged-in",
                getIDToken: () => "tok-99",
                getContext: () => ({ type: "external" }),
                getProfile: async () => ({
                    userId: "U-99",
                    displayName: "E2E User",
                    pictureUrl: "https://example.com/p.jpg",
                }),
                isInClient: () => false,
                getOS: () => "web",
                login: (opts) => {
                    // Capture instead of redirecting (so test can assert)
                    window.__loginCalls.push(opts);
                    document.getElementById("login-called").textContent = "true";
                    document.getElementById("redirect-uri").textContent =
                        opts.redirectUri || "—";
                },
                closeWindow: () => {},
            };
        }
    </script>

    <script type="module">
        import { initLiff } from "/liff-src/shared/liff-init.js";

        const $ = (id) => document.getElementById(id);

        $("btn-init").addEventListener("click", async () => {
            try {
                const ctx = await initLiff("LIFF_ID_TEST");
                if (ctx === null) {
                    $("result").textContent = "null (redirected to login)";
                } else {
                    $("result").textContent = "ctx returned";
                    $("ctx").textContent = JSON.stringify(
                        {
                            idToken: ctx.idToken,
                            isInClient: ctx.isInClient,
                            os: ctx.os,
                            profileUserId: ctx.profile?.userId,
                        },
                        null,
                        2
                    );
                }
            } catch (err) {
                $("result").textContent = `error: ${err.message}`;
            }
        });
    </script>
</body>
</html>
