<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>DINOCO E2E — built Vite bundle smoke test</title>
</head>
<body>
    <div id="app">
        <h1>Built bundle smoke test</h1>
        <p>Entry: <code id="entry">—</code></p>
        <p>Bundle file: <code id="bundle-file">—</code></p>
        <p>Stage: <span id="stage">init</span></p>
        <p>BOOT_MARKER seen: <span id="marker-seen">false</span></p>
        <p>DINOCO_B2B_CATALOG global: <span id="global-present">false</span></p>
        <p>Bootstrap result: <pre id="bootstrap-result">—</pre></p>
        <p id="error" style="color:red"></p>
    </div>

    <!--
      Mock window.liff BEFORE the Vite bundle imports liff-init.js.
      Bundle uses dynamic ES module resolution — top-level imports run
      before our DOMContentLoaded handler.
    -->
    <script>
        window.liff = {
            init: async () => {},
            isLoggedIn: () => true,
            getIDToken: () => "mock-id-token",
            getContext: () => ({ type: "external" }),
            getProfile: async () => ({
                userId: "U-test",
                displayName: "E2E User",
                pictureUrl: "https://example.com/p.jpg",
            }),
            isInClient: () => true,
            getOS: () => "ios",
            login: () => {},
            closeWindow: () => {},
        };

        // Capture console.info to detect BOOT_MARKER without forcing
        // window.DINOCO_B2B_CATALOG_BOOT (which would auto-bootstrap)
        const origInfo = console.info;
        window.__bootMarkerSeen = false;
        console.info = function (...args) {
            const msg = args.join(" ");
            if (msg.includes("[b2b-catalog]") && msg.includes("V.0.1 pilot")) {
                window.__bootMarkerSeen = true;
            }
            return origInfo.apply(console, args);
        };
    </script>

    <script type="module">
        const $ = (id) => document.getElementById(id);

        try {
            // 1. Read manifest to find hashed bundle filename
            const entryKey = "b2b/catalog/entry.js";
            $("entry").textContent = entryKey;
            $("stage").textContent = "fetching manifest";

            const manifestResp = await fetch("/dist/liff/.vite/manifest.json");
            if (!manifestResp.ok) {
                throw new Error(
                    `manifest fetch failed (${manifestResp.status}) — run \`npm run build:liff\` first`
                );
            }
            const manifest = await manifestResp.json();
            const entry = manifest[entryKey];
            if (!entry || !entry.file) {
                throw new Error(`manifest missing entry: ${entryKey}`);
            }
            $("bundle-file").textContent = entry.file;

            // 2. Load CSS sibling so resolved layout works
            if (entry.css && Array.isArray(entry.css)) {
                for (const css of entry.css) {
                    const link = document.createElement("link");
                    link.rel = "stylesheet";
                    link.href = `/dist/liff/${css}`;
                    document.head.appendChild(link);
                }
            }

            // 3. Dynamic import the built bundle
            $("stage").textContent = "importing bundle";
            const bundleUrl = `/dist/liff/${entry.file}`;
            await import(bundleUrl);

            // 4. Verify BOOT_MARKER printed + global frozen object exposed
            $("marker-seen").textContent = String(!!window.__bootMarkerSeen);
            $("global-present").textContent = String(
                !!(window.DINOCO_B2B_CATALOG && window.DINOCO_B2B_CATALOG.bootstrap)
            );

            if (!window.DINOCO_B2B_CATALOG) {
                throw new Error("window.DINOCO_B2B_CATALOG not exposed by bundle");
            }

            // 5. Run bootstrap with mock LIFF — full module composition
            //    (initLiff via mocked window.liff → cart facade)
            $("stage").textContent = "running bootstrap";
            const result = await window.DINOCO_B2B_CATALOG.bootstrap({
                liffId: "1234567890-MockLiffId",
                sessionToken: "test-session",
                // No authEndpoint → skip backend auth, use sessionToken directly
            });

            if (!result) {
                throw new Error("bootstrap returned null (LIFF redirect path?)");
            }

            // 6. Exercise the cart facade — proves all 4 shared modules
            //    bundled correctly (cart + api-client + modal + liff-init)
            result.cart.add("SKU-A", 2);
            result.cart.add("SKU-B", 1);
            const summary = {
                count: result.cart.count(),
                total: result.cart.total({ "SKU-A": 100, "SKU-B": 250 }),
                payload: result.cart.toOrder(),
                version: window.DINOCO_B2B_CATALOG.version,
            };
            window.__bootstrapResult = summary;
            $("bootstrap-result").textContent = JSON.stringify(summary, null, 2);
            $("stage").textContent = "ready";
        } catch (err) {
            $("error").textContent = `${err.name}: ${err.message}`;
            $("stage").textContent = "error";
        }
    </script>
</body>
</html>
