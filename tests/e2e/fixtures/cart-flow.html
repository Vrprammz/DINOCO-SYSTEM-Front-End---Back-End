<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>DINOCO E2E — cart flow fixture</title>
</head>
<body>
    <div id="app">
        <h1>Cart fixture</h1>
        <p id="status">idle</p>
        <ul id="items"></ul>
        <p>Item count: <span id="count">0</span></p>
        <p>Total: <span id="total">0</span></p>
        <p id="missing-skus"></p>
        <button id="add-a">Add SKU-A (×2)</button>
        <button id="add-b">Add SKU-B (×1)</button>
        <button id="add-unknown">Add UNKNOWN-SKU</button>
        <button id="clear">Clear</button>
        <button id="set-a-5">Set SKU-A qty=5</button>
    </div>

    <script type="module">
        // Source modules imported directly — exercises the same code Jest
        // tests via a real Chromium runtime. Phase 7 V.1.0+ will swap to
        // Vite-built bundles once Phase 2 LIFF migration extracts inline
        // JS from WP snippets.
        import {
            createCart,
            addToCart,
            setCartQty,
            removeFromCart,
            clearCart,
            computeTotal,
            computeItemCount,
            getMissingPriceSkus,
            toOrderItems,
        } from "/liff-src/shared/cart.js";

        const PRICE_MAP = { "SKU-A": 100, "SKU-B": 250 };

        let state = createCart();

        function render() {
            const items = document.getElementById("items");
            items.innerHTML = "";
            for (const sku of Object.keys(state.items)) {
                const li = document.createElement("li");
                li.dataset.sku = sku;
                li.textContent = `${sku} × ${state.items[sku].qty}`;
                items.appendChild(li);
            }
            document.getElementById("count").textContent = String(
                computeItemCount(state)
            );
            document.getElementById("total").textContent = String(
                computeTotal(state, PRICE_MAP)
            );
            const missing = getMissingPriceSkus(state, PRICE_MAP);
            document.getElementById("missing-skus").textContent =
                missing.length > 0 ? "missing: " + missing.join(",") : "";
            document.getElementById("status").textContent = "ready";
            // Expose payload to tests
            window.__lastPayload = toOrderItems(state);
        }

        document.getElementById("add-a").addEventListener("click", () => {
            state = addToCart(state, "SKU-A", 2);
            render();
        });
        document.getElementById("add-b").addEventListener("click", () => {
            state = addToCart(state, "SKU-B", 1);
            render();
        });
        document.getElementById("add-unknown").addEventListener("click", () => {
            state = addToCart(state, "UNKNOWN-SKU", 1);
            render();
        });
        document.getElementById("clear").addEventListener("click", () => {
            state = clearCart(state);
            render();
        });
        document.getElementById("set-a-5").addEventListener("click", () => {
            state = setCartQty(state, "SKU-A", 5);
            render();
        });

        render();
    </script>
</body>
</html>
