<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>DINOCO E2E — api-client fixture</title>
</head>
<body>
    <div id="app">
        <h1>API client fixture</h1>
        <p id="status">idle</p>
        <pre id="result"></pre>
        <pre id="error"></pre>
        <button id="get-catalog">GET /catalog</button>
        <button id="post-order">POST /place-order</button>
        <button id="trigger-401">GET /unauthorized (401)</button>
    </div>

    <script type="module">
        import { createB2BApi } from "/liff-src/shared/api-client.js";

        const api = createB2BApi({
            base: "/wp-json/b2b/v1",
            sessionToken: "test-session-99",
        });

        function setStatus(s) {
            document.getElementById("status").textContent = s;
        }

        async function run(label, fn) {
            setStatus(`${label}: pending`);
            document.getElementById("result").textContent = "";
            document.getElementById("error").textContent = "";
            try {
                const result = await fn();
                document.getElementById("result").textContent = JSON.stringify(
                    result
                );
                setStatus(`${label}: ok`);
            } catch (err) {
                document.getElementById("error").textContent = JSON.stringify({
                    message: err.message,
                    status: err.status,
                    body: err.body,
                });
                setStatus(`${label}: error`);
            }
        }

        document
            .getElementById("get-catalog")
            .addEventListener("click", () => run("getCatalog", () => api.getCatalog()));

        document
            .getElementById("post-order")
            .addEventListener("click", () =>
                run("placeOrder", () =>
                    api.placeOrder({ items: [{ sku: "SKU-A", qty: 2 }] })
                )
            );

        document
            .getElementById("trigger-401")
            .addEventListener("click", () =>
                run("trigger401", () =>
                    api._api("GET", "/unauthorized")
                )
            );
    </script>
</body>
</html>
