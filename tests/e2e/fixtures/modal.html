<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>DINOCO E2E — modal fixture</title>
</head>
<body>
    <div id="app">
        <h1>Modal fixture</h1>
        <p>Mode: <span id="mode">—</span></p>
        <p>Last action: <span id="last">—</span></p>
        <p id="result"></p>

        <button id="btn-alert">alert()</button>
        <button id="btn-confirm-yes">confirm() — expect OK</button>
        <button id="btn-confirm-no">confirm() — expect Cancel</button>
        <button id="btn-toast">toast()</button>
    </div>

    <script type="module">
        // Two test modes selected via URL hash:
        //   #fallback (default) — no window.dinocoModal, exercise native shim
        //   #production         — sets window.dinocoModal first, exercise bridge passthrough
        const mode = window.location.hash === "#production" ? "production" : "fallback";
        document.getElementById("mode").textContent = mode;

        if (mode === "production") {
            // Mock production modal API (mimics WP snippet implementation)
            window.__productionCalls = [];
            window.dinocoModal = {
                alert: (opts) => {
                    window.__productionCalls.push({ type: "alert", opts });
                },
                confirm: (opts) => {
                    window.__productionCalls.push({ type: "confirm", opts });
                    // For E2E we always invoke onConfirm to verify wiring
                    if (opts.onConfirm) opts.onConfirm();
                },
                toast: (opts) => {
                    window.__productionCalls.push({ type: "toast", opts });
                },
            };
        }

        // Module import MUST come AFTER window.dinocoModal is set,
        // since modal.js resolves the bridge at import time.
        const { modal } = await import("/liff-src/shared/modal.js");

        const $ = (id) => document.getElementById(id);

        $("btn-alert").addEventListener("click", () => {
            modal.alert({ title: "Heads up", message: "Something happened" });
            $("last").textContent = "alert called";
        });

        $("btn-confirm-yes").addEventListener("click", () => {
            modal.confirm({
                title: "Delete?",
                message: "This cannot be undone",
                onConfirm: () => ($("result").textContent = "user clicked OK"),
                onCancel: () => ($("result").textContent = "user clicked Cancel"),
            });
            $("last").textContent = "confirm-yes called";
        });

        $("btn-confirm-no").addEventListener("click", () => {
            modal.confirm({
                title: "Delete?",
                message: "This cannot be undone",
                onConfirm: () => ($("result").textContent = "user clicked OK"),
                onCancel: () => ($("result").textContent = "user clicked Cancel"),
            });
            $("last").textContent = "confirm-no called";
        });

        $("btn-toast").addEventListener("click", () => {
            modal.toast({ message: "Saved", type: "success" });
            $("last").textContent = "toast called";
        });
    </script>
</body>
</html>
